<!DOCTYPE html>
<html>
<head>
  <title>Billing</title>

  <style>
    /* POPUP BACKDROP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* CARD */
.popup-card {
  background: #ffffff;
  padding: 25px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: fadeIn 0.3s ease;
}

/* TITLE */
.popup-card h2 {
  margin-bottom: 15px;
}

/* PRICE BOX */
.price-box {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  background: #f5f7fa;
}

.price-box.total {
  background: #e8f5e9;
  font-weight: bold;
}

.price-box.next {
  background: #eef7ff;
}

/* LABEL */
.label {
  margin-top: 10px;
  font-size: 13px;
  color: #666;
}

/* BUTTONS */
.actions {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

#continuePayment {
  flex: 1;
  background: linear-gradient(135deg, #00c853, #00bfa5);
  color: white;
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

#continuePayment:hover {
  opacity: 0.9;
}

#closePopup {
  flex: 1;
  background: #eee;
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}


  </style>


</head>

<body>

  <h1>Billing Summary</h1>

  <div id="billingPopup" class="popup">
  <div class="popup-card">

    <h2 id="productName"></h2>

    <div class="price-box">
      <p>Setup Fee</p>
      <h3 id="setupPrice"></h3>
    </div>

    <div class="price-box">
      <p>Monthly</p>
      <h3 id="monthlyPrice"></h3>
    </div>

    <div class="price-box total">
      <p>Total Today</p>
      <h2 id="totalToday"></h2>
    </div>

    <div class="price-box next">
  <p>Next Billing</p>
  <h3 id="monthlyNext"></h3>
</div>

    <p class="label" id="billingLabel"></p>

    <div class="actions">
      <button id="continuePayment">Proceed Payment</button>
      <button id="closePopup">Close</button>
    </div>

  </div>
</div>

  <script>
    const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 🔥 FETCH SYSTEM FROM BACKEND
fetch("https://modular-infrastructure.onrender.com/api/systems/" + id)
  .then(res => res.json())
  .then(data => {

    document.getElementById("productName").innerText = data.name;
    document.getElementById("setupPrice").innerText = "$" + data.setup_fee;
    document.getElementById("monthlyPrice").innerText = "$" + data.monthly_fee;
    document.getElementById("totalToday").innerText =
      "$" + (Number(data.setup_fee) + Number(data.monthly_fee));

    document.getElementById("monthlyNext").innerText =
      "$" + data.monthly_fee + "/month";

    document.getElementById("billingLabel").innerText = data.label;

    // 🔥 SHOW POPUP
    document.getElementById("billingPopup").style.display = "flex";
  });

// 🔒 CLOSE POPUP
document.getElementById("closePopup").onclick = () => {
  document.getElementById("billingPopup").style.display = "none";
};

// 💳 PAYMENT (ONLY BUTTON THAT MATTERS NOW)
document.getElementById("continuePayment").onclick = async () => {

  if (!id) {
    alert("Missing product ID");
    return;
  }

  try {
    const res = await fetch("https://modular-infrastructure.onrender.com/api/pay", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        product_id: id
      })
    });

    const result = await res.json();

    if (result?.data?.link) {
      window.location.href = result.data.link;
    } else {
      throw new Error();
    }

  } catch (err) {
    alert("Payment failed");
  }
};


    
  </script>

</body>
</html>

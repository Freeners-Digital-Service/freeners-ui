<!DOCTYPE html>
<html>
<head>
  <title>Billing</title>
</head>

<body>

  <h1>Billing Summary</h1>

  <div id="billing-box"></div>

  <button id="pay-btn">Proceed Payment</button>

  <script>
    const box = document.getElementById("billing-box");
    const payBtn = document.getElementById("pay-btn");

    // 🔥 GET DATA FROM LOCAL STORAGE
    const data = JSON.parse(localStorage.getItem("selectedProduct"));

    if (!data) {
      box.innerHTML = "<p>No product selected</p>";
      payBtn.style.display = "none";
    } else {
      const setup = data.setup_fee;
      const monthly = data.monthly_fee;
      const total = setup + monthly;

      box.innerHTML = `
        <h2>${data.name}</h2>
        <p>Setup Fee: $${setup}</p>
        <p>Monthly Fee: $${monthly}</p>
        <hr>
        <h3>Total Today: $${total}</h3>
        <p>Next Billing: $${monthly}/month</p>
      `;
    }

    // 🔥 PAYMENT
    payBtn.addEventListener("click", async () => {

      if (!data?.id) {
        alert("Missing product ID");
        return;
      }

      payBtn.innerText = "Processing...";
      payBtn.disabled = true;

      try {
        const res = await fetch("https://modular-infrastructure.onrender.com/api/pay", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            product_id: data.id
          })
        });

        const result = await res.json();

        if (result?.data?.link) {
          window.location.href = result.data.link;
        } else {
          throw new Error();
        }

      } catch (err) {
        alert("Payment failed");
        payBtn.innerText = "Proceed Payment";
        payBtn.disabled = false;
      }

    });
  </script>

</body>
</html>

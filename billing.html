<!DOCTYPE html>
<html>
<head>
  <title>Billing</title>

  <style>

  /* =========================
     PAGE BACKGROUND
  ========================= */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
  }

  /* =========================
     PAGE LAYOUT
  ========================= */
  .page-container {
    min-height: 100vh;
    padding: 40px 20px;
    position: relative;
  }

  /* =========================
     BILLING CARD (SIDE INFO)
  ========================= */
  .billing-card {
    position: absolute;
    top: 40px;
    left: 40px;

    background: #ffffff;
    color: #111;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .billing-card h1 {
    margin-bottom: 10px;
  }

  .billing-card p {
    color: #555;
    font-size: 14px;
  }

  /* =========================
     POPUP BACKDROP
  ========================= */
  .popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  /* =========================
     POPUP CARD
  ========================= */
  .popup-card {
    background: #ffffff;
    padding: 28px;
    border-radius: 14px;
    width: 340px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    animation: fadeIn 0.25s ease;
  }

  /* =========================
     TITLE
  ========================= */
  .popup-card h2 {
    margin-bottom: 18px;
    font-size: 20px;
    font-weight: 700;
    color: #111;
  }

  /* =========================
     PRICE BOX
  ========================= */
  .price-box {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    padding: 12px;
    border-radius: 10px;
    background: #f1f5f9;
  }

  .price-box.total {
    background: #dcfce7;
    border: 1px solid #22c55e;
    font-weight: bold;
  }

  .price-box.next {
    background: #e0f2fe;
    border: 1px solid #0284c7;
  }

  /* =========================
     LABEL
  ========================= */
  #billingLabel {
    margin-top: 12px;
    font-size: 13px;
    color: #444;
  }

  /* =========================
     BUTTONS
  ========================= */
  .actions {
    margin-top: 22px;
    display: flex;
    gap: 12px;
  }

  #continuePayment {
    flex: 1;
    background: #16a34a;
    color: white;
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
  }

  #closePopup {
    flex: 1;
    background: #f1f5f9;
    border: none;
    padding: 13px;
    border-radius: 10px;
    cursor: pointer;
  }

  /* =========================
   ANIMATION
========================= */
@keyframes fadeIn {
  from {
    transform: scale(0.95);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

  </style>
</head>

<body>

  <!-- PAGE CONTAINER -->
  <div class="page-container">

    <div class="billing-card">
      <h1>Billing Summary</h1>
      <p>Review your system before payment</p>
    </div>

  </div>

  <!-- POPUP -->
  <div id="billingPopup" class="popup">
    <div class="popup-card">

      <h2 id="systemName"></h2>

      <div class="price-box">
        <p>Setup Fee</p>
        <h3 id="setupPrice"></h3>
      </div>

      <div class="price-box">
        <p>Monthly</p>
        <h3 id="monthlyPrice"></h3>
      </div>

      <div class="price-box total">
        <p>Total Today</p>
        <h2 id="totalToday"></h2>
      </div>

      <div class="price-box next">
        <p>Next Billing</p>
        <h3 id="monthlyNext"></h3>
      </div>

      <p id="billingLabel"></p>

      <div class="actions">
        <button id="continuePayment">Proceed Payment</button>
        <button id="closePopup">Close</button>
      </div>

    </div>
  </div>

  <!-- =========================
       JS
  ========================= -->
  <script>
  document.addEventListener("DOMContentLoaded", () => {

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      alert("No system selected");
      return;
    }

    // FETCH SYSTEM
    fetch("https://modular-infrastructure.onrender.com/api/systems/" + id)
      .then(res => res.json())
      .then(data => {

        document.getElementById("systemName").innerText = data.name;
        document.getElementById("setupPrice").innerText = "$" + data.setup_fee;
        document.getElementById("monthlyPrice").innerText = "$" + data.monthly_fee;

        document.getElementById("totalToday").innerText =
          "$" + (Number(data.setup_fee) + Number(data.monthly_fee));

        document.getElementById("monthlyNext").innerText =
          "$" + data.monthly_fee + "/month";

        document.getElementById("billingLabel").innerText = data.label;

        document.getElementById("billingPopup").style.display = "flex";
      })
      .catch(err => {
        console.error(err);
        alert("Failed to load system data");
      });

    // CLOSE POPUP
    document.getElementById("closePopup").onclick = () => {
      document.getElementById("billingPopup").style.display = "none";
    };

    // PAYMENT
    document.getElementById("continuePayment").onclick = async () => {

      try {
        const res = await fetch("https://modular-infrastructure.onrender.com/api/pay", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            system_id: id,
            email: "test@email.com"
          })
        });

        const result = await res.json();

        if (result?.data?.link) {
          window.location.href = result.data.link;
        } else {
          throw new Error();
        }

      } catch (err) {
        console.error(err);
        alert("Payment failed");
      }

    };

  });
  </script>

</body>
</html>
